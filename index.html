<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coba Tailwind 3.1</title>
    <link rel="stylesheet" href="css/output.css" />
  </head>
  <body>
    <h1 class="text-5xl text-hijau">Hello TailwindCSS 3.1</h1>
    <div class="kotak">ini tulisan</div>

    <!-- Membuat tema warna -->
    <div class="flex items-center justify-center h-80 bg-gray-100">
      <h3 class="px-8 py-6 mt-4 font-bold text-center text-sky-900">My Form</h3>
      <form action="">
        <div class="mt-4">
          <div>
            <label class="block text-sky-800" for="email">Email</label>
            <input
              type="text"
              placeholder="masukan email.."
              class="text-sm w-full px-4 py-2 mt-2 border rounded-md transition ease-in-out focus:outline-none focus:ring-2 focus: ring-offset-2 focus:ring-sky-600"
            />
          </div>
          <div class="flex items-baseline justify-center">
            <button
              class="px-6 py-2 mt-4 text-white transition ease-in-out bg-sky-600 rounded-md hover:bg-sky-900"
            >
              Kirim
            </button>
          </div>
        </div>
      </form>
    </div>
  </body>
</html>
